<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        calendar-box {
            background-color: lightgreen;
            padding: 10px;
            border-radius: 10px;
            display: block;
        }

        #cals {
            margin-top: 20px;
        }

        .event {
            flex-grow: 1;
            flex-basis: 0;
            background-color: white;
            border-radius: 10px;
            padding: 10px;
        }

        .events {
            display: flex;
            gap: 10px;
        }
    </style>
    <h1>Cal</h1>
    <p id="top-info">Welcome to Cal. Please log in.</p>
    <input id="usrName" type="text">
    <input id="pwd" type="text">
    <button id="log-in">Log in</button>
    <button id="log-out" style="display: none;">Log out</button>
    <button id="dark-mode">Dark mode</button>
    <p id="status"></p>
    <div id="logged-in" style="background-color: lime; display: none;">
        <p>You are now logged in!</p>
    </div>
    <div id="cals">
    </div>
    <script src="store.js"></script>
    <script src="state.js"></script>
</body>
</html>
